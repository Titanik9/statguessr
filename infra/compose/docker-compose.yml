services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay_console
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://relay:relay@postgres:5432/relay_console
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: relay-console
      JWT_SECRET: change-me-with-at-least-32-characters
      ENCRYPTION_KEY: change-me-32-bytes-minimum
      PUBLIC_BASE_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      AUTH_DEV_PREVIEW: "true"
      AUTO_MIGRATE_ON_BOOT: "true"
    depends_on:
      - postgres
      - redis
      - clickhouse
      - minio
      - mailpit
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: celery -A relay_console.worker.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://relay:relay@postgres:5432/relay_console
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_URL: http://clickhouse:8123
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: relay-console
      JWT_SECRET: change-me-with-at-least-32-characters
      ENCRYPTION_KEY: change-me-32-bytes-minimum
      PUBLIC_BASE_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      AUTH_DEV_PREVIEW: "true"
      AUTO_MIGRATE_ON_BOOT: "false"
    depends_on:
      - postgres
      - redis
      - clickhouse
      - minio

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/v1
      NEXT_PUBLIC_APP_NAME: Relay Console
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
